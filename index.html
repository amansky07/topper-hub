<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Topper Hub</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:18px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 0 10px rgba(0,0,0,.3);
}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

.btn:hover{
background:#2563eb;
}

.progress{
background:#334155;
height:15px;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
width:35%;
background:lime;
}

.subject{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.subject button{
padding:15px;
border:none;
border-radius:10px;
background:#0ea5e9;
color:white;
font-size:16px;
cursor:pointer;
}

.bottom{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
justify-content:space-around;
background:#1e293b;
padding:10px;
}

.bottom button{
background:none;
border:none;
color:white;
font-size:15px;
}

</style>

</head>

<body>

<h1>🔥 Topper Hub</h1>

<div class="card">

<h2>🎯 Today's Mission</h2>

<p>✔ Math Chapter 1</p>
<p>✔ Science Revision</p>

<button class="btn" onclick="mission()">
Mission Start
</button>

</div>

<div class="card">

<h2>📊 Today's Progress</h2>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<p id="progressText">35% Complete</p>

</div>

<div class="card">

<h2>📚 Subject Question Bank</h2>

<div class="subject">

<button onclick="math()">
📘 Math
</button>

<button onclick="science()">
🔬 Science
</button>

<button onclick="english()">
📖 English
</button>

<button onclick="sst()">
🌍 SST
</button>

</div>

</div>

<div class="card">

<h2>🤖 AI Success Coach</h2>

<p>
आज कम से कम 2 घंटे पढ़ाई करो।
</p>

<button class="btn" onclick="coach()">
Open Coach
</button>

</div>

<div class="bottom">

<button>🏠 Home</button>

<button>📚 Study</button>

<button>🎯 Mission</button>

<button>👤 Profile</button>

</div>

<script>

let progress=35;

function mission(){

alert("Mission Started 🚀");

progress=60;

document.getElementById("bar").style.width=progress+"%";

document.getElementById("progressText").innerHTML=progress+"% Complete";

}

function math(){

alert("Math Question Bank (Coming in Part 2)");

}

function science(){

alert("Science Question Bank (Coming in Part 2)");

}

function english(){

alert("English Question Bank (Coming in Part 2)");

}

function sst(){

alert("SST Question Bank (Coming in Part 2)");

}

function coach(){

alert("AI Success Coach (Coming in Part 3)");

}

</script>

</body>
</html>
