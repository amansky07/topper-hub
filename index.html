<!DOCTYPE html>

<head>

    <h2>🔥 Topper Hub Dashboard</h2>

    </div>

    <div class="card">

        <button class="btn" onclick="alert('Opening Math Bank...')">Math</button>

<!-- Main Dashboard -->
<div id="dashboard" style="background:#0f172a; color:white; padding:20px; font-family:sans-serif; border-radius:15px; margin:10px;">
    
    <!-- Header: Streak & XP -->
    <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <span>🔥 5 Day Streak</span>

    <!-- Today's Mission -->
    <div style="background:#1e293b; padding:15px; border-radius:10px; border-left: 5px solid #f59e0b;">

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
