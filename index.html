<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topper Hub - Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4">

    <header class="mb-8 text-center">
        <h1 class="text-4xl font-bold text-yellow-400">🔥 Community Hub</h1>
        <p class="text-sm opacity-70 mt-2">दोस्तों के साथ मुकाबला करें और टॉपर्स की लिस्ट देखें!</p>
    </header>

    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Leaderboard -->
        <section class="glass p-6 rounded-3xl">
            <h2 class="text-2xl font-bold mb-6 text-yellow-300">🏆 Global Leaderboard</h2>
            <ul id="leaderboard-list" class="space-y-3">
                <!-- Sample Data -->
                <li class="flex justify-between p-4 bg-white/5 rounded-xl border border-white/10">
                    <span>1. अमन (Topper)</span>
                    <span class="font-bold text-yellow-400">2500 XP</span>
                </li>
                <li class="flex justify-between p-4 bg-white/5 rounded-xl border border-white/10">
                    <span>2. राहुल (Scholar)</span>
                    <span class="font-bold text-yellow-400">2100 XP</span>
                </li>
                <li class="flex justify-between p-4 bg-white/5 rounded-xl border border-white/10">
                    <span>3. प्रिया (Learner)</span>
                    <span class="font-bold text-yellow-400">1800 XP</span>
                </li>
            </ul>
        </section>

        <!-- Multiplayer Arena -->
        <section class="glass p-6 rounded-3xl">
            <h2 class="text-2xl font-bold mb-6 text-indigo-400">⚔️ Multiplayer Arena</h2>
            <div class="space-y-4">
                <button onclick="alert('रूम कोड बन गया: AMAN123 - इसे दोस्तों को भेजें!')" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-bold transition-all">🎯 Create Challenge Room</button>
                <div class="flex gap-2">
                    <input type="text" placeholder="Enter Room Code" class="w-full p-4 rounded-xl bg-white/10 text-white border border-white/10">
                    <button class="bg-green-600 px-6 rounded-xl font-bold">Join</button>
                </div>
                <p class="text-xs opacity-50 text-center mt-4">अपने दोस्त को कोड भेजें और रियल-टाइम क्विज़ खेलें!</p>
            </div>
        </section>
    </div>

</body>
</html>
